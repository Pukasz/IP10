        function countQuestionsInEntry(entry) {
            return Array.isArray(entry.questions) ? entry.questions.length : 1;
        }

        function shuffleQuestions(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function pickRandomQuestions(bank, difficulty, count) {
            const pool = shuffleQuestions(bank[difficulty] || []);
            const selected = [];
            let questionCount = 0;

            for (const entry of pool) {
                if (questionCount >= count) {
                    break;
                }

                selected.push(entry);
                questionCount += countQuestionsInEntry(entry);
            }

            return selected;
        }

        // Map score bands into only 2 difficulty sections
        function getDifficultyBucketFromLevel(levelKey) {
            if (['beginner', 'elementary', 'intermediate'].includes(levelKey)) {
                return 'foundation';
            }
            return 'challenge';
        }

        function renderQuestionCards(entries) {
            if (!entries.length) {
                return '<p style="color:#6b7280;">No questions added in this difficulty group yet. Add your questions to <strong>questionBank</strong> in this file.</p>';
            }

            let questionNumber = 0;

            function renderSingleQuestion(q) {
                const qId = `q${questionNumber}`;
                const displayNumber = questionNumber + 1;
                questionNumber += 1;
                const choices = (q.choices || []).map((choice, cidx) => `
                    <label style="display:block; margin-bottom:0.3rem; cursor:pointer;">
                        <input type="radio" name="${qId}" value="${cidx}" data-qid="${q.id || qId}" data-answer="${q.answer}" style="margin-right:0.5em;">
                        ${choice}
                    </label>
                `).join('');

                return `
                    <div class="q-card" id="card-${qId}">
                        <p><strong>Q${displayNumber}.</strong> ${q.text}</p>
                        <form>${choices}</form>
                        <div class="feedback" style="margin-top:0.4em; min-height:1.2em;"></div>
                    </div>
                `;
            }

            return entries.map((entry) => {
                if (Array.isArray(entry.questions)) {
                    return `
                        <div class="passage-group">
                            <h3>${entry.title}</h3>
                            <div class="passage-text">${entry.passage}</div>
                            ${entry.questions.map(renderSingleQuestion).join('')}
                        </div>
                    `;
                }

                return renderSingleQuestion(entry);
            }).join('');
        }

                if (form) {
                    form.addEventListener('change', function(e) {
                        if (e.target && e.target.matches('input[type="radio"]')) {
                            const selected = parseInt(e.target.value, 10);
                            const correct = parseInt(e.target.getAttribute('data-answer'), 10);
                            if (selected === correct) {
                                feedback.textContent = '✅ Correct!';
                                feedback.style.color = '#27ae60';
                            } else {
                                feedback.textContent = '❌ Incorrect.';
                                feedback.style.color = '#e74c3c';
                            }
                            // Disable all radios in this form after answer
                            const radios = form.querySelectorAll('input[type="radio"]');
                            radios.forEach(r => r.disabled = true);
                        }
                    });
